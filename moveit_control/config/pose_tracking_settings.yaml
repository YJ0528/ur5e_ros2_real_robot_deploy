realtime_pose_tracking_node:
  ros__parameters:
    moveit_servo:      
      #################################
      # PID parameters for pose seeking
      #################################

      # Maximum value of error integral for all PID controllers
      windup_limit: 0.05

      # PID gains
      x_proportional_gain: 2.0
      y_proportional_gain: 2.0
      z_proportional_gain: 2.0
      x_integral_gain: 0.05
      y_integral_gain: 0.05
      z_integral_gain: 0.10
      x_derivative_gain: 0.01
      y_derivative_gain: 0.01
      z_derivative_gain: 0.01

      angular_proportional_gain: 1.5
      angular_integral_gain: 0.0
      angular_derivative_gain: 0.0

